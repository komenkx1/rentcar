<!DOCTYPE html>

<html class="light" lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary-fixed": "#001848",
                    "surface": "#f9f9ff",
                    "on-secondary-container": "#586579",
                    "tertiary-fixed": "#71fe93",
                    "secondary-fixed-dim": "#bac7de",
                    "on-tertiary": "#ffffff",
                    "tertiary-container": "#005a25",
                    "on-primary": "#ffffff",
                    "on-error-container": "#93000a",
                    "primary": "#003180",
                    "tertiary-fixed-dim": "#52e079",
                    "surface-container-low": "#f1f3ff",
                    "surface-container": "#e9edff",
                    "outline-variant": "#c3c6d5",
                    "on-secondary-fixed-variant": "#3b485a",
                    "on-secondary": "#ffffff",
                    "on-tertiary-fixed": "#002109",
                    "tertiary": "#004019",
                    "inverse-primary": "#b2c5ff",
                    "error": "#ba1a1a",
                    "surface-bright": "#f9f9ff",
                    "on-error": "#ffffff",
                    "inverse-surface": "#293041",
                    "on-primary-container": "#a6bdff",
                    "surface-tint": "#0c56d0",
                    "primary-fixed-dim": "#b2c5ff",
                    "primary-container": "#0046b0",
                    "inverse-on-surface": "#edf0ff",
                    "secondary-fixed": "#d6e3fb",
                    "on-surface": "#141b2c",
                    "surface-container-lowest": "#ffffff",
                    "surface-dim": "#d2daf0",
                    "secondary": "#525f73",
                    "secondary-container": "#d6e3fb",
                    "outline": "#737784",
                    "on-tertiary-fixed-variant": "#005322",
                    "on-primary-fixed-variant": "#0040a2",
                    "on-surface-variant": "#434653",
                    "on-background": "#141b2c",
                    "background": "#f9f9ff",
                    "on-secondary-fixed": "#0f1c2d",
                    "surface-container-highest": "#dbe2f9",
                    "surface-container-high": "#e0e8ff",
                    "primary-fixed": "#dae2ff",
                    "surface-variant": "#dbe2f9",
                    "error-container": "#ffdad6",
                    "on-tertiary-container": "#49d872"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      body { -webkit-tap-highlight-color: transparent; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface">
<!-- TopAppBar Shell -->
<header class="fixed top-0 w-full z-50 bg-surface/70 backdrop-blur-xl shadow-sm h-16 flex items-center px-4">
<div class="flex items-center w-full gap-4">
<button class="active:scale-95 transition-transform hover:bg-surface-container-low p-2 rounded-xl">
<span class="material-symbols-outlined text-blue-900" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline font-bold tracking-tight text-blue-900 text-lg">Form Pemesanan</h1>
</div>
</header>
<main class="pt-20 pb-32 px-4 max-w-md mx-auto space-y-6">
<!-- Vehicle Summary Card: Editorial Style -->
<section class="bg-surface-container-lowest rounded-xl p-4 overflow-hidden shadow-sm">
<div class="flex gap-4">
<div class="w-32 h-24 rounded-lg overflow-hidden bg-surface-container">
<img class="w-full h-full object-cover" data-alt="Modern white family MPV parked in a minimalist clean showroom with bright studio lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDNDxaq4xCtgv03XXp4DH4pLMIIzOzAXoLCdjqIwBMOPj7-JyUp-iXV4GtNuOD8AhqL9oCtYe4pGBZcsC1hflZNVWhsuWI_RMG6ERKPjpPC_ZCeLTK2UpzkY7ERp5tVx1ZoIx7BvCzG_7KgZIQkLVdjZWexGYfGm1W_w1DxmGAh1VPpttA4ven5YlziHMw2uiSg4vNuh3eeDSNf6OFJUS5IasSe_DSVumGaMV-aBwCJMt-_iq6ik-_op8ZHySmnN8NZf7uZwCulm9A"/>
</div>
<div class="flex-1 flex flex-col justify-center">
<span class="text-xs font-bold text-primary uppercase tracking-widest mb-1">Pilihan Unit</span>
<h2 class="font-headline font-bold text-xl text-on-surface leading-tight">Toyota Avanza</h2>
<p class="text-sm text-on-surface-variant font-medium">Rp450.000 <span class="text-xs font-normal">/hari</span></p>
</div>
</div>
</section>
<!-- Booking Form Container -->
<form class="space-y-8">
<!-- Identity Section -->
<div class="space-y-4">
<h3 class="font-headline font-bold text-on-surface">Informasi Penyewa</h3>
<div class="space-y-1">
<label class="text-xs font-semibold text-secondary ml-1" for="nama">Nama Lengkap</label>
<input class="w-full px-4 py-4 bg-surface-container-high border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 rounded-xl transition-all font-medium text-on-surface placeholder:text-outline" id="nama" placeholder="Sesuai KTP" type="text"/>
</div>
<div class="space-y-1">
<label class="text-xs font-semibold text-secondary ml-1" for="wa">Nomor HP (WhatsApp)</label>
<input class="w-full px-4 py-4 bg-surface-container-high border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 rounded-xl transition-all font-medium text-on-surface placeholder:text-outline" id="wa" inputmode="numeric" placeholder="0812xxxx" type="text"/>
</div>
</div>
<!-- Rental Details -->
<div class="space-y-4">
<h3 class="font-headline font-bold text-on-surface">Detail Sewa</h3>
<!-- Selection Chips for Rental Option -->
<div class="grid grid-cols-2 gap-3">
<label class="relative cursor-pointer">
<input checked="" class="peer sr-only" name="rental_type" type="radio"/>
<div class="flex items-center justify-center p-4 rounded-xl bg-surface-container-high text-on-surface-variant peer-checked:bg-primary-container peer-checked:text-white transition-all font-semibold text-sm">
                            Lepas Kunci
                        </div>
</label>
<label class="relative cursor-pointer">
<input class="peer sr-only" name="rental_type" type="radio"/>
<div class="flex items-center justify-center p-4 rounded-xl bg-surface-container-high text-on-surface-variant peer-checked:bg-primary-container peer-checked:text-white transition-all font-semibold text-sm">
                            Dengan Sopir
                        </div>
</label>
</div>
<!-- Date Range -->
<div class="grid grid-cols-2 gap-3">
<div class="space-y-1">
<label class="text-xs font-semibold text-secondary ml-1">Mulai Sewa</label>
<div class="relative">
<input class="w-full pl-10 pr-4 py-4 bg-surface-container-high border-0 rounded-xl font-medium text-sm focus:ring-primary" type="date"/>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-primary text-lg" data-icon="calendar_today">calendar_today</span>
</div>
</div>
<div class="space-y-1">
<label class="text-xs font-semibold text-secondary ml-1">Selesai Sewa</label>
<div class="relative">
<input class="w-full pl-10 pr-4 py-4 bg-surface-container-high border-0 rounded-xl font-medium text-sm focus:ring-primary" type="date"/>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-primary text-lg" data-icon="event_busy">event_busy</span>
</div>
</div>
</div>
<!-- Pickup Location -->
<div class="space-y-1">
<label class="text-xs font-semibold text-secondary ml-1" for="lokasi">Lokasi Pengambilan</label>
<div class="relative">
<input class="w-full pl-10 pr-4 py-4 bg-surface-container-high border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 rounded-xl transition-all font-medium text-on-surface placeholder:text-outline" id="lokasi" placeholder="Contoh: Bandara Ngurah Rai" type="text"/>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-primary text-lg" data-icon="location_on">location_on</span>
</div>
</div>
</div>
<!-- Pricing Breakdown Section: Tonal Layering -->
<div class="bg-surface-container-low rounded-xl p-5 space-y-3">
<div class="flex justify-between items-center text-sm">
<span class="text-on-surface-variant">Harga Sewa (2 Hari)</span>
<span class="font-semibold text-on-surface">Rp900.000</span>
</div>
<div class="flex justify-between items-center text-sm">
<span class="text-on-surface-variant">Biaya Layanan</span>
<span class="font-semibold text-on-surface">Rp20.000</span>
</div>
<div class="pt-3 border-t border-outline-variant/30 flex justify-between items-center">
<span class="font-headline font-bold text-on-surface">Total Pembayaran</span>
<span class="font-headline font-extrabold text-blue-800 text-lg">Rp920.000</span>
</div>
</div>
</form>
</main>
<!-- BottomNavBar Shell (Sticky Action) -->
<nav class="fixed bottom-0 left-0 w-full flex justify-between items-center px-6 py-4 pb-safe bg-surface/70 backdrop-blur-xl z-50 rounded-t-3xl shadow-[0_-4px_24px_rgba(20,27,44,0.06)]">
<!-- Inactive navigation state: Price Label -->
<div class="flex flex-col items-start justify-center text-on-surface p-1">
<span class="font-inter text-xs font-medium text-on-surface-variant">Total Price</span>
<span class="font-headline font-bold text-blue-800 text-lg leading-none">Rp920.000</span>
</div>
<!-- Active navigation state: Submit Button -->
<button class="flex items-center justify-center bg-gradient-to-br from-blue-800 to-blue-600 text-white rounded-xl py-4 px-8 min-h-[56px] w-auto active:scale-[0.98] transition-transform duration-200 hover:brightness-110 shadow-lg shadow-primary/20">
<span class="font-inter text-sm font-semibold mr-2">Submit</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</nav>
</body></html>
